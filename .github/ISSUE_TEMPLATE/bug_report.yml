name: 🐛 Bug report
description: Something is broken or behaves unexpectedly
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please search existing issues first, then fill this out so we can reproduce quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: "Running `make train-smoke` fails with ... but I expected ..."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps. Include the exact command and config changes.
      placeholder: |
        1. `pip install -e ".[train]"`
        2. Set `configs/train.yaml: base_model: ...`
        3. `make train-smoke`
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / traceback
      description: Paste the error. This is automatically formatted as code.
      render: shell
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - data pipeline
        - training
        - evaluation / gate
        - serving
        - monitoring
        - provider adapter (gcp/aws/azure/k8s)
        - copilot backend
        - copilot frontend / finetune-copilot launcher
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `puffin version` or the git SHA.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS + Python (+ Node if UI)
      placeholder: "Windows 11, Python 3.11.9, Node 22.15"
    validations:
      required: true
