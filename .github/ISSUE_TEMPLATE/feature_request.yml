name: 💡 Feature request
description: Suggest a recipe, provider, or improvement
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Start with the user problem, not the solution.
      placeholder: "When I fine-tune for X, I have to hand-edit Y every time because ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like to see. Config-first solutions are preferred over new code paths.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you set them aside.
  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR for this
