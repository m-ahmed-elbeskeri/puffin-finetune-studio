name: publish

# Publishes the package to PyPI when you cut a GitHub Release, using PyPI
# Trusted Publishing (OIDC): no API tokens or secrets are stored anywhere.
# One-time setup on PyPI is documented in the release notes / README.

on:
  release:
    types: [published]
  workflow_dispatch: {}   # allow a manual run from the Actions tab

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only actually publish for a real release (not a manual dry-run build).
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/puffin-finetune-studio/
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
