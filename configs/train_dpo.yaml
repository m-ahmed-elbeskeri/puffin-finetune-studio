run_name: dpo-v1

# ---------------------------------------------------------------------------
# Model — same surface as configs/train.yaml
# ---------------------------------------------------------------------------
model:
  base_model: meta-llama/Llama-3.1-8B-Instruct
  smoke_base_model: HuggingFaceTB/SmolLM2-135M-Instruct
  loader: hf                # hf | unsloth
  attn_impl: sdpa           # eager | sdpa | flash_attention_2 | flex_attention
  quantization: null
  # quantization:
  #   backend: bitsandbytes
  #   load_in_4bit: true
  #   bnb_4bit_quant_type: nf4
  #   bnb_4bit_compute_dtype: bfloat16
  #   bnb_4bit_use_double_quant: true

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  train_path: data/processed/preference_train.jsonl
  eval_path:  data/processed/preference_eval.jsonl
  max_length: 1024
  max_prompt_length: 512
  chat_template_version: v1

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
training:
  epochs: 1
  learning_rate: 5.0e-6
  weight_decay: 0.0
  warmup_ratio: 0.0
  lr_scheduler_type: cosine
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  bf16: true
  fp16: false
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  seed: 42
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: no
  save_total_limit: 3
  max_grad_norm: 1.0
  optim: adamw_torch
  use_liger_kernel: false
  report_to: none

# ---------------------------------------------------------------------------
# PEFT (same schema as train.yaml)
# ---------------------------------------------------------------------------
lora:
  enabled: true
  method: lora             # lora | dora | ia3 | adalora | none
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  use_rslora: false
  use_dora: false
  init_lora_weights: true
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

# ---------------------------------------------------------------------------
# DPO loss
# ---------------------------------------------------------------------------
dpo:
  beta: 0.1               # preference strength; lower = stay closer to ref
  # loss_type options:
  #   sigmoid (default)   - Bradley-Terry log-sigmoid (original DPO)
  #   hinge               - SLiC-style hinge
  #   ipo                 - Identity Preference Optimization (less overfit)
  #   exo_pair            - reverse-KL (needs label_smoothing > 0)
  #   nca_pair            - Noise Contrastive Alignment
  #   robust              - cDPO / Robust DPO (label_smoothing as flip prob)
  #   bco_pair            - Binary Classifier Optimization
  #   sppo_hard           - Self-Play Preference Optimization
  #   aot / aot_unpaired  - Distributional alignment via optimal transport
  #   apo_zero / apo_down - Anchored Preference Optimization
  #   discopop            - LLM-discovered loss
  #   sigmoid_norm        - SimPO (length-normalized sigmoid)
  #   sft                 - plain SFT loss (only useful in multi-loss MPO mix)
  loss_type: sigmoid
  # Multi-loss (MPO) — list of loss_types with matching weights:
  # loss_type: [sigmoid, bco_pair, sft]
  # loss_weights: [0.8, 0.2, 1.0]
  label_smoothing: 0.0    # >0 for cDPO/robust; exo_pair requires >0
  sync_ref_model: false   # periodically sync ref ← policy (advanced)
  precompute_ref_log_probs: false  # save memory by caching ref logprobs once

# ---------------------------------------------------------------------------
# Distributed (advisory; launch via `accelerate launch` to take effect)
# ---------------------------------------------------------------------------
parallelism:
  profile: single
  accelerate_config: null

# ---------------------------------------------------------------------------
# Tracking
# ---------------------------------------------------------------------------
tracking:
  backend: ${PUFFIN_TRACKING_BACKEND:-mlflow}
  experiment_name: ${MLFLOW_EXPERIMENT_NAME:-puffin-dpo}

output:
  adapter_dir: artifacts/dpo-adapter
