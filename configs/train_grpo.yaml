run_name: grpo-v1

model:
  base_model: meta-llama/Llama-3.1-8B-Instruct
  smoke_base_model: HuggingFaceTB/SmolLM2-135M-Instruct
  loader: hf
  attn_impl: sdpa
  quantization: null

# GRPO data: just prompts. The model samples completions and scores them.
data:
  train_path: data/processed/prompts_train.jsonl
  max_prompt_length: 256
  chat_template_version: v1

training:
  epochs: 1
  learning_rate: 1.0e-6
  weight_decay: 0.0
  warmup_ratio: 0.0
  lr_scheduler_type: constant
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  bf16: true
  fp16: false
  gradient_checkpointing: true
  seed: 42
  logging_steps: 5
  save_strategy: epoch
  save_total_limit: 3
  max_grad_norm: 1.0
  optim: adamw_torch
  report_to: none

lora:
  enabled: true
  method: lora
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]

# GRPO sampling. num_generations must divide per_device_batch x grad_accum.
grpo:
  num_generations: 4
  max_completion_length: 128
  temperature: 0.9
  beta: 0.04

# Built-in reward (length toward target + optional keyword match). Swap for a
# reward model or a real reward function for a serious run.
reward:
  target_chars: 200
  keywords: []

tracking:
  backend: ${PUFFIN_TRACKING_BACKEND:-mlflow}
  experiment_name: ${MLFLOW_EXPERIMENT_NAME:-puffin-grpo}

output:
  adapter_dir: artifacts/grpo-adapter
